<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💌 A Special Surprise...</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600;700&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet"/>
  
  <link rel="stylesheet" href="shared.css"/>
  <link rel="stylesheet" href="page1.css"/>
</head>
<body>

  <!-- Background Canvas -->
  <canvas id="particleCanvas"></canvas>

  <!-- Navigation Dots -->
  <nav class="nav-dots">
    <a href="page1.html" class="dot active" title="Welcome"></a>
    <a href="page2.html" class="dot" title="Our Story"></a>
    <a href="page3.html" class="dot" title="Why I Love You"></a>
    <a href="page4.html" class="dot" title="Your Future"></a>
    <a href="page5.html" class="dot" title="Forever"></a>
  </nav>

  <!-- Music Button -->
  <button id="musicOrb" onclick="toggleMusic()" title="Play Music">♪</button>

  <main class="hero-wrap">
    
    <!-- Envelope Component -->
    <div class="env-container" id="envBtn">
      <div class="envelope" id="envelope">
        <div class="env-flap" id="envFlap"></div>
        <div class="env-paper" id="envPaper">
          <div class="paper-content">
            <h3>For Rola 🌹</h3>
            <p>Open me...</p>
          </div>
        </div>
        <div class="env-front"></div>
      </div>
      <div class="click-hint">Click the envelope!</div>
    </div>

    <!-- Hidden Content that reveals after opening envelope -->
    <div class="hero-content" id="heroContent">
      <div class="badge reveal">✨ Special Surprise ✨</div>
      
      <h1 class="title reveal">
        To The Girl Who Stole<br/>
        <span class="gradient-text">My Heart 💖</span>
      </h1>
      
      <p class="subtitle reveal">
        Every word here comes straight from my soul...<br/>
        I wanted to create something as beautiful and unique as you are.
      </p>

      <div class="typewriter-box reveal">
        <p id="typedText"></p>
      </div>

      <a href="page2.html" class="btn reveal">
        Start The Journey
        <span class="arrow">→</span>
      </a>
    </div>
  </main>

  <script src="shared.js"></script>
  <script>
    // Page 1 Specific Logic
    const envBtn = document.getElementById('envBtn');
    const envelope = document.getElementById('envelope');
    const heroContent = document.getElementById('heroContent');
    const typedText = document.getElementById('typedText');
    
    let opened = false;

    envBtn.addEventListener('click', () => {
      if (opened) return;
      opened = true;
      
      // Animate Envelope
      envelope.classList.add('open');
      document.querySelector('.click-hint').style.opacity = 0;
      
      // Burst hearts
      for(let i=0; i<15; i++) {
        setTimeout(() => {
          const h = document.createElement('div');
          h.className = 'fheart';
          h.textContent = ['💖','🌹','✨','💕'][Math.floor(Math.random()*4)];
          h.style.left = `calc(50% + ${(Math.random()-0.5)*200}px)`;
          h.style.top = `calc(40% + ${(Math.random()-0.5)*200}px)`;
          h.style.fontSize = (Math.random()*20 + 15) + 'px';
          h.style.animation = 'fhRise 1.5s ease-out forwards';
          document.body.appendChild(h);
          setTimeout(() => h.remove(), 1500);
        }, i*100);
      }

      // Hide envelope & show content
      setTimeout(() => {
        envBtn.style.opacity = 0;
        envBtn.style.transform = 'scale(0.8) translateY(50px)';
        setTimeout(() => {
          envBtn.style.display = 'none';
          heroContent.classList.add('show');
          
          // Trigger reveals manually since they are now visible
          setTimeout(() => {
            document.querySelectorAll('#heroContent .reveal').forEach(el => el.classList.add('visible'));
            startTypewriter();
          }, 100);

        }, 500);
      }, 1200);
    });

    // Typewriter Effect
    const msgs = [
      "You are my absolute favorite person...",
      "Your smile lights up my entire world...",
      "I love everything about you...",
      "Ready to see what I made for you? 🥰"
    ];
    let mIdx = 0;
    let cIdx = 0;
    
    function startTypewriter() {
      if (mIdx >= msgs.length) return;
      
      const currentMsg = msgs[mIdx];
      
      if (cIdx < currentMsg.length) {
        typedText.innerHTML += currentMsg.charAt(cIdx);
        cIdx++;
        setTimeout(startTypewriter, 50);
      } else {
        setTimeout(() => {
          if(mIdx < msgs.length - 1) {
            typedText.innerHTML = '';
            cIdx = 0;
            mIdx++;
            startTypewriter();
          } else {
            // Keep the last message showing
            typedText.style.borderRight = 'none';
          }
        }, 1500);
      }
    }
  </script>
</body>
</html>
